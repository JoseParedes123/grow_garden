<html>

    <body>
        <img class="rizo" src="Media/rizo2.svg" alt="curl_down" style="bottom: 10; left: 42%;">

        <main>
                <input type="checkbox" id="menu-comprar">
                <input type="checkbox" id="menu-vender">
                <input type="checkbox" id="menu-usuario">
                <input type="checkbox" id="planta-datos">
            <nav>

            </nav>

                    <div class="listado"><p></p></div>
                </div>
                
                <div class="lado">
                    <button class="flecha"><img class="flecha" src="Media/flecha.svg" alt="Arrow"></button>
                </div>
                <div class="escena">

                    <div class="pasto"></div>
                </div>
                <div class="lado">
                    <button class="flecha"><img class="flecha" src="Media/flecha.svg" alt="Arrow" style="transform: rotate(180deg);"></button>
                </div>

                <div class="planta">
                    <img src="Media/rizo3.svg" alt="rizo" height="16px">
                    <h1 style="color: white;font-style: italic;">Planta_name</h1>
                    <img src="Media/rizo3.svg" alt="rizo" height="16px">
                    <div>
                        <img src="Media/plantaej.svg" alt="planta" width="50%">
                    </div>
                    <div style="background: white; color: black;">
                        <p class="listado">descripcion<p>
                    </div>
                    <div class="planta-datos"><p>cosecha propia 5% loool</p></div>
                </div>
